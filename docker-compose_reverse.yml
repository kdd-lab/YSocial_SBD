services:
    nginx:
        image: nginx:latest
        container_name: nginx
        depends_on:
            - ysocial
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        networks:
            - my-network
        ports:
            - "8080:8080"
        restart: always

    ysocial:
        shm_size: 64gb
        build:
            context: ./
            dockerfile: Dockerfile_dgx
            args:
                - UID=${UID:-1056}
                - GID=${GID:-1056}
                - UNAME=giuliorossetti
        container_name: ysocial
        user: "${UID}:${GID}"
        depends_on:
            - ollama
        volumes:
            - .:/app
        environment:
            - FLASK_APP=/app/y_social.py
            - NVIDIA_VISIBLE_DEVICES=all
            - NVIDIA_DRIVER_CAPABILITIES=compute,utility
            - OLLAMA_HOST=http://ollama:11434
            - OLLAMA_BASE_URL=http://ollama:11434
            - OPENAI_BASE_URL=http://ollama:11434/v1
            - RAY_TMPDIR=/dev/shm
            - RAY_ACCEL_ENV_VAR_OVERRIDE_ON_ZERO=0
        networks:
            - my-network
        expose:
            - "5000"
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [gpu]
        runtime: nvidia
        command: ["python", "/app/y_social.py", "--host", "0.0.0.0", "--port", "5000", "--llm-backend", "http://ollama:11434"]
        restart: always

    ollama:
        image: ollama/ollama:latest
        container_name: ollama
        volumes:
            - ~/.ollama:/root/.ollama
        # This line maps the container port to your host machine's localhost
        ports:
            - "127.0.0.1:11434:11434"
        environment:
            - NVIDIA_VISIBLE_DEVICES=6,7
            - OLLAMA_NUM_PARALLEL=10
            - OLLAMA_MAX_LOADED_MODELS=5
            # OLLAMA_HOST=0.0.0.0 is required inside the container 
            # so it listens on the network interface shared with ysocial
            - OLLAMA_HOST=0.0.0.0:11434
        ports:
            - "127.0.0.1:11434:11434"
        deploy:
            resources:
                limits:
                    cpus: '3.0'
        networks:
            - my-network
        extra_hosts:
            - "localhost:host-gateway"
        shm_size: 10g 
        runtime: nvidia
        restart: always

networks:
    my-network:
        name: ysocial-internal-net