worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 8080;  # <--- MUST match the container-side port in docker-compose
        server_name localhost;

        location / {
            # 1. Allow kddsna Static IP (for direct access if ever needed)
            allow ; # your IP

            # 2. Allow the Docker Gateway (The IP seen in your logs)
            allow 172.20.0.1;

            # 3. Allow the Docker Internal Subnet (Optional but recommended)
            allow 172.16.0.0/12;

            # 4. Allow Loopback
            allow 127.0.0.1;

            deny all;

            proxy_pass http://ysocial:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}


