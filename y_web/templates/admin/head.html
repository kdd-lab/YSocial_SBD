<!-- Mobile Sidebar Styles -->
<style>
/* Sidebar toggle button - only visible on small screens */
.sidebar-toggle-btn {
    display: none;
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 1100;
    background: #fff;
    border: 1px solid #e6e6e6;
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.sidebar-toggle-btn svg {
    width: 22px;
    height: 22px;
    color: #333;
}

/* Overlay for mobile sidebar */
.sidebar-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1050;
}

.sidebar-overlay.active {
    display: block;
}

/* Mobile responsive styles */
@media screen and (max-width: 768px) {
    .sidebar-toggle-btn {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .dashboard-aside {
        position: fixed;
        left: -280px;
        top: 0;
        height: 100vh;
        width: 260px;
        z-index: 1060;
        transition: left 0.3s ease;
        overflow-y: auto;
        background: #fff;
        display: flex;
        flex-direction: column;
        box-shadow: 2px 0 12px rgba(0,0,0,0.15);
        padding-top: 48px; /* Space for hamburger button */
    }
    
    .dashboard-aside.open {
        left: 0;
    }
    
    /* Mobile sidebar header with logo - centered, first element */
    .dashboard-aside .dashboard-aside-brand {
        display: flex !important;
        align-items: center;
        justify-content: center;
        padding: 16px 20px;
        border-bottom: 1px solid #e6e6e6;
        background: #fafafa;
        margin: 0;
        width: 100%;
        box-sizing: border-box;
    }
    
    .dashboard-aside .dashboard-aside-brand img {
        display: block;
        max-width: 120px;
        height: auto;
    }
    
    /* Sidebar body - vertical list with no extra spacing */
    .dashboard-aside-body {
        display: flex;
        flex-direction: column;
        padding: 0;
        margin: 0;
    }
    
    .dashboard-aside-body hr {
        width: calc(100% - 32px);
        margin: 0 16px;
        border: none;
        border-top: 1px solid #e6e6e6;
    }
    
    .dashboard-aside-body hr:first-child {
        display: none; /* Hide the first hr after logo */
    }
    
    /* Standard mobile menu item - compact padding */
    .dashboard-aside-link {
        display: flex;
        align-items: center;
        width: 100%;
        padding: 8px 20px;
        text-decoration: none;
        color: #333;
        transition: background 0.2s, color 0.2s;
        border-left: 3px solid transparent;
    }
    
    .dashboard-aside-link div {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
    }
    
    .dashboard-aside-link svg {
        width: 20px !important;
        height: 20px !important;
        color: #555;
        flex-shrink: 0;
    }
    
    .dashboard-aside-link span {
        font-size: 0.9em;
        font-weight: 500;
        color: #333;
    }
    
    .dashboard-aside-link:hover {
        background: #f5f5f5;
        border-left-color: #039be5;
    }
    
    .dashboard-aside-link:hover svg {
        color: #039be5;
    }
    
    .dashboard-aside-link:hover span {
        color: #039be5;
    }
    
    /* Active state for current page */
    .dashboard-aside-link.active {
        background: #e3f2fd;
        border-left-color: #039be5;
    }
    
    .dashboard-aside-link.active svg,
    .dashboard-aside-link.active span {
        color: #039be5;
    }
    
    /* Footer section - no spacing, directly after body */
    .dashboard-aside-end {
        display: flex;
        flex-direction: column;
        padding: 0;
        margin: 0;
        border-top: 1px solid #e6e6e6;
        background: #fafafa;
    }
    
    /* Adjust main content when sidebar is hidden */
    .view-wrapper {
        margin-left: 0 !important;
        padding-left: 15px;
        padding-top: 55px;
    }
    
    .dashboard-container {
        padding-left: 0 !important;
    }
}

/* Tutorial highlighting for sidebar elements - works on both desktop and mobile */
.dashboard-aside-link.tutorial-highlighted {
    position: relative !important;
    z-index: 10000 !important;
    background: #ffffff !important;
    box-shadow: 0 4px 20px rgba(3, 155, 229, 0.4) !important;
    border-radius: 8px !important;
    border-left-color: #039be5 !important;
}

/* Desktop sidebar tutorial highlighting */
@media screen and (min-width: 769px) {
    .dashboard-aside-link.tutorial-highlighted {
        margin: 4px 8px;
        padding: 10px 12px !important;
    }
}
</style>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById('dashboard-sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    
    if (sidebar.classList.contains('open')) {
        closeSidebar();
    } else {
        sidebar.classList.add('open');
        overlay.classList.add('active');
    }
}

function closeSidebar() {
    const sidebar = document.getElementById('dashboard-sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
}

// Close sidebar when clicking on a link (for mobile)
document.addEventListener('DOMContentLoaded', function() {
    const sidebarLinks = document.querySelectorAll('.dashboard-aside-link');
    sidebarLinks.forEach(link => {
        link.addEventListener('click', function() {
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        });
    });
});
</script>
