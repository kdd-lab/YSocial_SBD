<!-- Mobile Sidebar Styles -->
<style>
/* Sidebar toggle button - only visible on small screens */
.sidebar-toggle-btn {
    display: none;
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 1100;
    background: #fff;
    border: 1px solid #e6e6e6;
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.sidebar-toggle-btn svg {
    width: 20px;
    height: 20px;
    color: #333;
}

/* Overlay for mobile sidebar */
.sidebar-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1050;
}

.sidebar-overlay.active {
    display: block;
}

/* Mobile responsive styles */
@media screen and (max-width: 768px) {
    .sidebar-toggle-btn {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .dashboard-aside {
        position: fixed;
        left: -260px;
        top: 0;
        height: 100vh;
        width: 240px;
        z-index: 1060;
        transition: left 0.3s ease;
        overflow-y: auto;
        background: #fff;
        display: flex;
        flex-direction: column;
    }
    
    .dashboard-aside.open {
        left: 0;
    }
    
    /* Ensure sidebar body items are stacked vertically */
    .dashboard-aside-body {
        display: flex;
        flex-direction: column;
        padding: 0 10px;
    }
    
    .dashboard-aside-body hr {
        width: 100%;
        margin: 8px 0;
        border: none;
        border-top: 1px solid #e6e6e6;
    }
    
    .dashboard-aside-link {
        display: block;
        width: 100%;
        padding: 10px 15px;
        margin: 2px 0;
        border-radius: 6px;
    }
    
    .dashboard-aside-link div {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    
    .dashboard-aside-link:hover {
        background: #f5f5f5;
    }
    
    /* Ensure end section is also vertical */
    .dashboard-aside-end {
        display: flex;
        flex-direction: column;
        padding: 0 10px;
        margin-top: auto;
        border-top: 1px solid #e6e6e6;
        padding-top: 10px;
    }
    
    /* Adjust main content when sidebar is hidden */
    .view-wrapper {
        margin-left: 0 !important;
        padding-left: 15px;
        padding-top: 50px;
    }
    
    .dashboard-container {
        padding-left: 0 !important;
    }
}
</style>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById('dashboard-sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    
    if (sidebar.classList.contains('open')) {
        closeSidebar();
    } else {
        sidebar.classList.add('open');
        overlay.classList.add('active');
    }
}

function closeSidebar() {
    const sidebar = document.getElementById('dashboard-sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
}

// Close sidebar when clicking on a link (for mobile)
document.addEventListener('DOMContentLoaded', function() {
    const sidebarLinks = document.querySelectorAll('.dashboard-aside-link');
    sidebarLinks.forEach(link => {
        link.addEventListener('click', function() {
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        });
    });
});
</script>
