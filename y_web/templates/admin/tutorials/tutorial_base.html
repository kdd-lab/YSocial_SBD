<!-- 
    Reusable Tutorial Base Component
    
    To use this template, include it in your page and define:
    - TUTORIAL_ID: Unique identifier for this tutorial (e.g., 'dashboard', 'agents')
    - TUTORIAL_STEPS: Array of step objects with id, selector, title, description, position
    - TUTORIAL_START_FUNC: Name of the global function to start the tutorial
    
    Example usage in your page-specific tutorial file:
    1. Set TUTORIAL_ID variable: { % set TUTORIAL_ID = 'dashboard' % }
    2. Include this template: { % include 'admin/tutorials/tutorial_base.html' % }
    3. Define your tutorial steps and start function in a script tag
-->

<div id="{{ TUTORIAL_ID }}-tutorial-overlay" class="page-tutorial-overlay" style="display: none;">
    <!-- Backdrop -->
    <div class="tutorial-backdrop" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9997;
        pointer-events: none;
    "></div>
    
    <!-- Highlight box -->
    <div class="tutorial-highlight" style="
        position: absolute;
        border: 2px solid #039be5;
        border-radius: 8px;
        box-shadow: 0 0 0 4px rgba(3, 155, 229, 0.15), 0 4px 12px rgba(3, 155, 229, 0.25);
        z-index: 9999;
        pointer-events: none;
        transition: all 0.3s ease-in-out;
        background: transparent;
    "></div>
    
    <!-- Tooltip/Description Box - styled to match admin panel boxes -->
    <div class="tutorial-tooltip" style="
        position: absolute;
        background: #fafafa;
        border: 1px solid #e6e6e6;
        border-left: 4px solid #039be5;
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        z-index: 10002;
        max-width: 380px;
        min-width: 300px;
        overflow: hidden;
        transition: all 0.3s ease-in-out;
    ">
        <!-- Header -->
        <div class="tutorial-header" style="
            background: linear-gradient(90deg, #039be5 0%, #4facfe 100%);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        ">
            <div>
                <span class="tutorial-step-indicator" style="
                    background: rgba(255, 255, 255, 0.25);
                    color: white;
                    padding: 2px 8px;
                    border-radius: 10px;
                    font-size: 0.7em;
                    font-weight: 600;
                ">Step 1 of X</span>
            </div>
            <button class="tutorial-close" style="
                background: rgba(255, 255, 255, 0.2);
                border: none;
                color: white;
                width: 24px;
                height: 24px;
                border-radius: 50%;
                cursor: pointer;
                font-size: 1.1em;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s;
            " title="Skip Tutorial">&times;</button>
        </div>
        
        <!-- Content -->
        <div class="tutorial-content" style="padding: 16px;">
            <h3 class="tutorial-title" style="
                margin: 0 0 8px 0;
                color: #363636;
                font-size: 1em;
                font-weight: 600;
            "></h3>
            <p class="tutorial-description" style="
                margin: 0;
                color: #666;
                font-size: 0.9em;
                line-height: 1.5;
            "></p>
        </div>
        
        <!-- Footer -->
        <div class="tutorial-footer" style="
            padding: 10px 16px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e6e6e6;
            background: white;
        ">
            <button class="tutorial-skip" style="
                background: none;
                border: none;
                color: #999;
                font-size: 0.8em;
                cursor: pointer;
                padding: 6px 10px;
                transition: color 0.2s;
            ">Skip</button>
            
            <button class="tutorial-next" style="
                background: linear-gradient(90deg, #039be5 0%, #4facfe 100%);
                border: none;
                color: white;
                padding: 8px 18px;
                border-radius: 4px;
                font-size: 0.85em;
                font-weight: 500;
                cursor: pointer;
                box-shadow: 0 2px 6px rgba(3, 155, 229, 0.3);
                transition: transform 0.2s, box-shadow 0.2s;
            ">Next →</button>
        </div>
    </div>
</div>

<style>
    .page-tutorial-overlay .tutorial-close:hover {
        background: rgba(255, 255, 255, 0.35);
    }
    
    .page-tutorial-overlay .tutorial-skip:hover {
        color: #363636;
    }
    
    .page-tutorial-overlay .tutorial-next:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(3, 155, 229, 0.4);
    }
    
    @keyframes tutorial-pulse {
        0% { box-shadow: 0 0 0 4px rgba(3, 155, 229, 0.15), 0 4px 12px rgba(3, 155, 229, 0.25); }
        50% { box-shadow: 0 0 0 6px rgba(3, 155, 229, 0.2), 0 4px 16px rgba(3, 155, 229, 0.35); }
        100% { box-shadow: 0 0 0 4px rgba(3, 155, 229, 0.15), 0 4px 12px rgba(3, 155, 229, 0.25); }
    }
    
    .page-tutorial-overlay .tutorial-highlight.pulse {
        animation: tutorial-pulse 2s infinite;
    }
    
    /* Responsive styles for small screens */
    @media screen and (max-width: 768px) {
        .page-tutorial-overlay .tutorial-tooltip {
            max-width: calc(100vw - 20px) !important;
            min-width: calc(100vw - 20px) !important;
            left: 10px !important;
            right: 10px !important;
            font-size: 0.9em;
        }
        
        .page-tutorial-overlay .tutorial-header {
            padding: 10px 14px !important;
        }
        
        .page-tutorial-overlay .tutorial-content {
            padding: 14px !important;
        }
        
        .page-tutorial-overlay .tutorial-content h3 {
            font-size: 1em !important;
        }
        
        .page-tutorial-overlay .tutorial-content p {
            font-size: 0.85em !important;
        }
        
        .page-tutorial-overlay .tutorial-footer {
            padding: 10px 15px 12px !important;
            flex-direction: column;
            gap: 10px;
        }
        
        .page-tutorial-overlay .tutorial-skip {
            order: 2;
            font-size: 0.8em !important;
        }
        
        .page-tutorial-overlay .tutorial-next {
            order: 1;
            width: 100%;
            padding: 12px 20px !important;
            font-size: 0.95em !important;
        }
        
        .page-tutorial-overlay .tutorial-highlight {
            border-width: 2px !important;
        }
    }
    
    @media screen and (max-width: 480px) {
        .page-tutorial-overlay .tutorial-tooltip {
            max-width: calc(100vw - 16px) !important;
            min-width: calc(100vw - 16px) !important;
            left: 8px !important;
            right: 8px !important;
            border-radius: 10px !important;
        }
        
        .page-tutorial-overlay .tutorial-step-indicator {
            font-size: 0.7em !important;
            padding: 2px 8px !important;
        }
        
        .page-tutorial-overlay .tutorial-close {
            width: 24px !important;
            height: 24px !important;
            font-size: 1em !important;
        }
    }
</style>

<script>
(function() {
    // Generic tutorial engine
    window.PageTutorialEngine = window.PageTutorialEngine || {};
    
    window.PageTutorialEngine.init = function(tutorialId, steps) {
        const overlay = document.getElementById(tutorialId + '-tutorial-overlay');
        if (!overlay) return null;
        
        const state = {
            id: tutorialId,
            steps: steps,
            currentStep: 0,
            active: false,
            currentHighlightedElement: null
        };
        
        const elements = {
            overlay: overlay,
            backdrop: overlay.querySelector('.tutorial-backdrop'),
            highlight: overlay.querySelector('.tutorial-highlight'),
            tooltip: overlay.querySelector('.tutorial-tooltip'),
            stepIndicator: overlay.querySelector('.tutorial-step-indicator'),
            title: overlay.querySelector('.tutorial-title'),
            description: overlay.querySelector('.tutorial-description'),
            nextBtn: overlay.querySelector('.tutorial-next'),
            skipBtn: overlay.querySelector('.tutorial-skip'),
            closeBtn: overlay.querySelector('.tutorial-close')
        };
        
        function findElement(step) {
            if (step.selector) {
                try {
                    return document.querySelector(step.selector);
                } catch (e) {
                    console.warn('Invalid selector:', step.selector, e);
                }
            }
            return null;
        }
        
        function positionElements(element, position) {
            const rect = element.getBoundingClientRect();
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
            const isMobile = window.innerWidth <= 768;
            
            // Position highlight - adjust padding for mobile
            const padding = isMobile ? 4 : 8;
            elements.highlight.style.top = (rect.top + scrollTop - padding) + 'px';
            elements.highlight.style.left = (rect.left + scrollLeft - padding) + 'px';
            elements.highlight.style.width = (rect.width + padding * 2) + 'px';
            elements.highlight.style.height = (rect.height + padding * 2) + 'px';
            
            // Get tooltip dimensions
            elements.tooltip.style.visibility = 'hidden';
            elements.tooltip.style.display = 'block';
            const tooltipRect = elements.tooltip.getBoundingClientRect();
            elements.tooltip.style.visibility = '';
            
            const gap = isMobile ? 10 : 15;
            // On mobile, use full width minus margins
            const tooltipWidth = isMobile ? (window.innerWidth - 20) : 400;
            const tooltipHeight = tooltipRect.height;
            
            let tooltipTop, tooltipLeft;
            
            // On mobile, always position tooltip at bottom or top of element
            if (isMobile) {
                // Check if there's more space above or below
                const spaceBelow = window.innerHeight - rect.bottom;
                const spaceAbove = rect.top;
                
                if (spaceBelow >= tooltipHeight + gap || spaceBelow > spaceAbove) {
                    // Position below
                    tooltipTop = rect.bottom + scrollTop + gap;
                } else {
                    // Position above
                    tooltipTop = rect.top + scrollTop - tooltipHeight - gap;
                }
                tooltipLeft = 10; // Always center on mobile
            } else {
                switch (position) {
                    case 'right':
                        tooltipTop = rect.top + scrollTop;
                        tooltipLeft = rect.right + scrollLeft + gap;
                        if (tooltipLeft + tooltipWidth > window.innerWidth) {
                            tooltipLeft = rect.left + scrollLeft - tooltipWidth - gap;
                        }
                        break;
                    case 'left':
                        tooltipTop = rect.top + scrollTop;
                        tooltipLeft = rect.left + scrollLeft - tooltipWidth - gap;
                        if (tooltipLeft < 0) {
                            tooltipLeft = rect.right + scrollLeft + gap;
                        }
                        break;
                    case 'top':
                        tooltipTop = rect.top + scrollTop - tooltipHeight - gap;
                        tooltipLeft = rect.left + scrollLeft + (rect.width / 2) - (tooltipWidth / 2);
                        if (tooltipTop < scrollTop) {
                            tooltipTop = rect.bottom + scrollTop + gap;
                        }
                        break;
                    case 'overlay':
                        tooltipTop = rect.top + scrollTop + (rect.height / 2) - (tooltipHeight / 2);
                        tooltipLeft = rect.left + scrollLeft + (rect.width / 2) - (tooltipWidth / 2);
                        break;
                    case 'bottom':
                    default:
                        tooltipTop = rect.bottom + scrollTop + gap;
                        tooltipLeft = rect.left + scrollLeft + (rect.width / 2) - (tooltipWidth / 2);
                        break;
                }
            }
            
            // Ensure tooltip stays on screen
            const margin = isMobile ? 8 : 10;
            tooltipLeft = Math.max(margin, Math.min(tooltipLeft, window.innerWidth - tooltipWidth - margin));
            const viewportTop = scrollTop;
            const viewportBottom = scrollTop + window.innerHeight;
            tooltipTop = Math.max(viewportTop + margin, Math.min(tooltipTop, viewportBottom - tooltipHeight - margin));
            
            elements.tooltip.style.top = tooltipTop + 'px';
            elements.tooltip.style.left = tooltipLeft + 'px';
        }
        
        function showStep(stepIndex) {
            const step = state.steps[stepIndex];
            if (!step) return;
            
            const element = findElement(step);
            
            if (!element) {
                console.warn('Element not found for step:', step.id);
                if (stepIndex < state.steps.length - 1) {
                    state.currentStep++;
                    showStep(state.currentStep);
                } else {
                    hideTutorial();
                }
                return;
            }
            
            // Update UI
            elements.stepIndicator.textContent = `Step ${stepIndex + 1} of ${state.steps.length}`;
            elements.title.textContent = step.title;
            elements.description.innerHTML = step.description;
            
            // Update button
            if (step.isLast) {
                elements.nextBtn.textContent = 'Finish Tutorial ✓';
                elements.nextBtn.style.background = 'linear-gradient(135deg, #4caf50 0%, #66bb6a 100%)';
            } else {
                elements.nextBtn.textContent = 'Got it! Next →';
                elements.nextBtn.style.background = 'linear-gradient(135deg, #039be5 0%, #00bcd4 100%)';
            }
            
            // Clean up previous highlight
            if (state.currentHighlightedElement) {
                state.currentHighlightedElement.style.position = '';
                state.currentHighlightedElement.style.zIndex = '';
                state.currentHighlightedElement.style.background = '';
                state.currentHighlightedElement.style.borderRadius = '';
                state.currentHighlightedElement.style.padding = '';
                state.currentHighlightedElement.style.boxShadow = '';
                state.currentHighlightedElement.classList.remove('tutorial-highlighted');
            }
            
            // Highlight current element - elevate above backdrop with solid background
            state.currentHighlightedElement = element;
            const originalPosition = window.getComputedStyle(element).position;
            if (originalPosition === 'static') {
                element.style.position = 'relative';
            }
            
            // Check if element is inside sidebar
            const isInSidebar = element.closest('.dashboard-aside') !== null;
            
            if (isInSidebar) {
                // For sidebar elements, use CSS class for proper highlighting
                element.classList.add('tutorial-highlighted');
                // Also elevate the sidebar itself during tutorial
                const sidebar = element.closest('.dashboard-aside');
                if (sidebar) {
                    sidebar.style.zIndex = '9999';
                    sidebar.style.background = '#fff';
                }
            } else {
                // For other elements, apply inline styles
                element.style.zIndex = '9998';
                
                // Add white background so element appears above the dark backdrop
                const computedBg = window.getComputedStyle(element).backgroundColor;
                const isTransparent = !computedBg || computedBg === 'transparent' || computedBg === 'rgba(0, 0, 0, 0)';
                
                if (isTransparent) {
                    element.style.background = '#ffffff';
                    element.style.borderRadius = '8px';
                    element.style.padding = '10px 12px';
                    element.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
                }
            }
            
            // Scroll and position
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            setTimeout(() => {
                positionElements(element, step.position);
                elements.highlight.classList.add('pulse');
            }, 500);
        }
        
        function nextStep() {
            state.currentStep++;
            if (state.currentStep >= state.steps.length) {
                hideTutorial();
            } else {
                showStep(state.currentStep);
            }
        }
        
        function hideTutorial() {
            state.active = false;
            
            if (state.currentHighlightedElement) {
                state.currentHighlightedElement.style.position = '';
                state.currentHighlightedElement.style.zIndex = '';
                state.currentHighlightedElement.style.background = '';
                state.currentHighlightedElement.style.borderRadius = '';
                state.currentHighlightedElement.style.padding = '';
                state.currentHighlightedElement.style.boxShadow = '';
                state.currentHighlightedElement.classList.remove('tutorial-highlighted');
                
                // Reset sidebar z-index if element was in sidebar
                const sidebar = state.currentHighlightedElement.closest('.dashboard-aside');
                if (sidebar) {
                    sidebar.style.zIndex = '';
                }
                
                state.currentHighlightedElement = null;
            }
            
            elements.overlay.style.display = 'none';
        }
        
        function startTutorial() {
            state.active = true;
            state.currentStep = 0;
            elements.overlay.style.display = 'block';
            showStep(state.currentStep);
        }
        
        // Event listeners
        elements.nextBtn.addEventListener('click', nextStep);
        elements.skipBtn.addEventListener('click', hideTutorial);
        elements.closeBtn.addEventListener('click', hideTutorial);
        
        // Handle resize
        let resizeTimeout;
        window.addEventListener('resize', function() {
            if (state.active) {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    showStep(state.currentStep);
                }, 200);
            }
        });
        
        return {
            start: startTutorial,
            hide: hideTutorial,
            isActive: () => state.active
        };
    };
})();
</script>
