<!-- Clients Tutorial -->
{% set TUTORIAL_ID = 'clients' %}
{% include 'admin/tutorial_base.html' %}

<script>
(function() {
    const clientsSteps = [
        {
            id: 'new-client',
            selector: '#box-new-client',
            title: '🤖 Create Simulation Client',
            description: `<p>Configure a new <b>simulation client</b> with these main settings:</p>
                <ul style="margin: 10px 0 0 18px; padding: 0; list-style: disc;">
                    <li><b>Name</b> - Unique client identifier</li>
                    <li><b>Description</b> - Purpose of this client</li>
                    <li><b>Population</b> - Agent population to simulate</li>
                    <li><b>Simulation Parameters</b> - Duration, agent behavior</li>
                    <li><b>Action Weights</b> - Agent action probabilities</li>
                    <li><b>LLM Configuration</b> - AI model settings</li>
                    <li><b>Recommender Systems</b> - Content and follow suggestions</li>
                </ul>
                <p style="margin-top: 10px; font-size: 0.9em; color: #888;">Scroll down to see all configuration sections.</p>`,
            position: 'overlay',
            isLast: true
        }
    ];
    
    // Filter steps to only include elements that exist
    const filteredSteps = clientsSteps.filter(step => {
        return document.querySelector(step.selector) !== null;
    });
    
    // Mark last step
    if (filteredSteps.length > 0) {
        filteredSteps.forEach(s => s.isLast = false);
        filteredSteps[filteredSteps.length - 1].isLast = true;
    }
    
    // Initialize tutorial when DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(() => {
            if (filteredSteps.length > 0) {
                const tutorial = window.PageTutorialEngine.init('clients', filteredSteps);
                if (tutorial) {
                    window.startClientsTutorial = tutorial.start;
                }
            }
        }, 500);
    });
})();
</script>
